<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Teal circle with shadow -->
  <circle cx="20" cy="20" r="20" fill="#009990"/>
  <!-- Subtle inner highlight ring -->
  <circle cx="20" cy="20" r="20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Double exclamation marks -->
  <text
    x="20" y="21"
    font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-weight="900"
    font-size="19"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
  >!!</text>
</svg>
