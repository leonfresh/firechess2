  <line x1="14" y1="36" x2="16.5" y2="33.5" stroke="#3b82f6" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="13.5" y1="39" x2="16" y2="36.5" stroke="#3b82f6" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
