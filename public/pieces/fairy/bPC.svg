<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="177.17" height="177.17">
  <defs>
    <linearGradient id="bPC-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#444"/>
      <stop offset="1" stop-color="#1f1a17"/>
    </linearGradient>
    <linearGradient id="bPC-shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#888" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#555" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bPC-chevron" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Base platform -->
  <ellipse cx="25" cy="46" rx="14" ry="3" fill="#1f1a17"/>
  <ellipse cx="25" cy="46" rx="12.5" ry="2.2" fill="url(#bPC-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Pedestal -->
  <path d="M14 44 Q14 42 16 40 L18 38 Q18.5 37.5 19 37 L31 37 Q31.5 37.5 32 38 L34 40 Q36 42 36 44 Z"
        fill="url(#bPC-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Pawn body -->
  <path d="M20 37 Q19.5 34 20 31 L20.5 28 Q21 25 22 23 L23 21 Q24 19 25 18 Q26 19 27 21 L28 23 Q29 25 29.5 28 L30 31 Q30.5 34 30 37 Z"
        fill="url(#bPC-body)" stroke="#111" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Pawn neck -->
  <path d="M22.5 20 Q23 18 25 17 Q27 18 27.5 20 Q27 19 25 18.5 Q23 19 22.5 20 Z"
        fill="url(#bPC-body)" stroke="#111" stroke-width="0.5"/>
  <!-- Pawn head (ball) -->
  <circle cx="25" cy="13" r="5.5" fill="url(#bPC-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Double upward chevrons on body — speed indicator -->
  <path d="M22.5 33 L25 30.5 L27.5 33" fill="none" stroke="url(#bPC-chevron)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22.5 29 L25 26.5 L27.5 29" fill="none" stroke="url(#bPC-chevron)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speed lines on the sides -->
  <line x1="17" y1="30" x2="19" y2="28" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <line x1="16.5" y1="33" x2="18.5" y2="31" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="36" x2="19" y2="34" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
  <line x1="33" y1="30" x2="31" y2="28" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <line x1="33.5" y1="33" x2="31.5" y2="31" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="33" y1="36" x2="31" y2="34" stroke="#60a5fa" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
  <!-- Small upward arrow above head -->
  <path d="M25 5 L27.5 8 L26 8 L26 10 L24 10 L24 8 L22.5 8 Z"
        fill="#60a5fa" opacity="0.75"/>
  <!-- Collar detail -->
  <path d="M20 37 Q25 35.5 30 37" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Shine highlight -->
  <path d="M23.5 19 Q24 17 24.5 19 L24.2 34 Q24 35 24 36 L23.2 36 Q23 35 23.5 34 Z"
        fill="url(#bPC-shine)" opacity="0.25"/>
</svg>
