  <line x1="18.2" y1="20.0" x2="28.5" y2="33.8" stroke="url(#bDr-claw)"  stroke-width="0.9"  stroke-linecap="round"/>
  <line x1="22.0" y1="20.0" x2="32.3" y2="33.8" stroke="url(#bDr-claw)"  stroke-width="0.75" stroke-linecap="round" opacity="0.5"/>
  <line x1="31.8" y1="20.0" x2="21.5" y2="33.8" stroke="url(#bDr-claw2)" stroke-width="0.9"  stroke-linecap="round" opacity="0.65"/>
