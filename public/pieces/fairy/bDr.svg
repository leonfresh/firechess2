  <path d="M17.95,9.22 L19.5,6.4 L21.05,9.22 Z" fill="#991b1b" opacity="0.9"/>
  <path d="M28.95,9.22 L30.5,6.4 L32.05,9.22 Z" fill="#991b1b" opacity="0.9"/>
  <!-- Rook dark outline (Merida  identical for white and black) -->
