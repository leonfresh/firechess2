  <ellipse cx="25" cy="27.2" rx="2.8" ry="1.9" fill="#991b1b"/>
  <ellipse cx="25" cy="27.2" rx="1.0"  ry="1.7" fill="#1f1a17"/>
  <circle  cx="25.7" cy="26.6" r="0.4"  fill="#fca5a5"/>
