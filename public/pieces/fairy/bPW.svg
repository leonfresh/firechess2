<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="177.17" height="177.17">
  <defs>
    <linearGradient id="bPW-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#444"/>
      <stop offset="1" stop-color="#1f1a17"/>
    </linearGradient>
    <linearGradient id="bPW-shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#888" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#555" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bPW-blade" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#888"/>
      <stop offset="1" stop-color="#ccc"/>
    </linearGradient>
    <linearGradient id="bPW-accent" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Base platform — wider/sturdier -->
  <ellipse cx="25" cy="46" rx="15" ry="3.2" fill="#1f1a17"/>
  <ellipse cx="25" cy="46" rx="13.5" ry="2.5" fill="url(#bPW-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Pedestal — broader -->
  <path d="M13 44 Q13 42 15 39.5 L17 37.5 Q17.5 37 18.5 36.5 L31.5 36.5 Q32.5 37 33 37.5 L35 39.5 Q37 42 37 44 Z"
        fill="url(#bPW-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Armored pawn body — slightly wider, more muscular -->
  <path d="M19 36.5 Q18.5 33 19 30 L19.5 27 Q20 24 21.5 22 L23 20 Q24 18.5 25 17.5 Q26 18.5 27 20 L28.5 22 Q30 24 30.5 27 L31 30 Q31.5 33 31 36.5 Z"
        fill="url(#bPW-body)" stroke="#111" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Neck -->
  <path d="M22 19.5 Q23 17.5 25 16.5 Q27 17.5 28 19.5 Q27 18.5 25 18 Q23 18.5 22 19.5 Z"
        fill="url(#bPW-body)" stroke="#111" stroke-width="0.5"/>
  <!-- Pawn head (ball) with helmet crest -->
  <circle cx="25" cy="13" r="5.5" fill="url(#bPW-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Helmet crest / mohawk ridge -->
  <path d="M25 7.5 Q24.5 9 24 10 Q24.5 8.5 25 7.5 Q25.5 8.5 26 10 Q25.5 9 25 7.5 Z"
        fill="#ddd" opacity="0.5"/>
  <!-- Bayonet blade from top -->
  <path d="M24.2 7.8 L25 2.5 L25.8 7.8 Z"
        fill="url(#bPW-blade)" stroke="#111" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Blade edge highlight -->
  <line x1="25" y1="3" x2="25" y2="7.5" stroke="#ccc" stroke-width="0.35" opacity="0.8"/>
  <!-- Crossguard with gold accent -->
  <rect x="21.5" y="7.3" width="7" height="1.3" rx="0.5" fill="url(#bPW-accent)" stroke="#111" stroke-width="0.4"/>
  <!-- Armor chevron on body — gold/amber -->
  <path d="M22 32 L25 29 L28 32" fill="none" stroke="url(#bPW-accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 28 L25 25 L28 28" fill="none" stroke="url(#bPW-accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speed lines on sides — blue -->
  <line x1="16" y1="28" x2="18" y2="26" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="15.5" y1="31" x2="17.5" y2="29" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="34" x2="18" y2="32" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="28" x2="32" y2="26" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="34.5" y1="31" x2="32.5" y2="29" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="34" x2="32" y2="32" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Red slash marks on body — blade motif -->
  <line x1="21.5" y1="24" x2="23" y2="22.5" stroke="#f87171" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="27" y1="22.5" x2="28.5" y2="24" stroke="#f87171" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <!-- Shoulder guards (small armor plates) -->
  <path d="M18.5 22 Q17 23 17 25 Q18 24.5 19 23 Z" fill="#ddd" opacity="0.25"/>
  <path d="M31.5 22 Q33 23 33 25 Q32 24.5 31 23 Z" fill="#ddd" opacity="0.25"/>
  <!-- Collar detail -->
  <path d="M19.5 36.5 Q25 35 30.5 36.5" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Shine highlight -->
  <path d="M23.5 18 Q24 16.5 24.5 18 L24.2 33 Q24 34.5 24 36 L23.2 36 Q23 34.5 23.5 33 Z"
        fill="url(#bPW-shine)" opacity="0.25"/>
</svg>
