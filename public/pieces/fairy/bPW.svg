  <ellipse cx="25" cy="24.5" rx="7.2" ry="1.3" fill="url(#bPW-b)" stroke="#111" stroke-width="0.5"/>
  <!-- Neck -->
  <rect x="22" y="14.5" width="6" height="2.5" rx="1.5" fill="url(#bPW-b)" stroke="#111" stroke-width="0.5"/>
  <!-- Head (slightly larger) -->
  <circle cx="25" cy="11" r="4.8" fill="url(#bPW-b)" stroke="#111" stroke-width="0.7"/>
  <!-- Shine -->
  <circle cx="23.5" cy="9.5" r="1.3" fill="#888" opacity="0.25"/>
  <!-- === WAR PAWN ACCENTS === -->
  <!-- Blade from top of head -->
  <path d="M24.2 6.5 L25 1.5 L25.8 6.5 Z"
        fill="url(#bPW-bl)" stroke="#111" stroke-width="0.5" stroke-linejoin="round"/>
  <line x1="25" y1="2" x2="25" y2="6" stroke="#ccc" stroke-width="0.35" opacity="0.8"/>
  <!-- Gold crossguard -->
  <rect x="21.5" y="5.8" width="7" height="1.3" rx="0.5" fill="url(#bPW-g)" stroke="#111" stroke-width="0.4"/>
  <!-- Gold double chevrons on skirt -->
  <path d="M20.5 36 L25 32 L29.5 36" fill="none" stroke="url(#bPW-g)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M21.5 31.5 L25 27.5 L28.5 31.5" fill="none" stroke="url(#bPW-g)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speed lines L -->
  <line x1="13" y1="33" x2="15.5" y2="30.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="12.5" y1="36" x2="15" y2="33.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="39" x2="14.5" y2="36.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Speed lines R -->
  <line x1="37" y1="33" x2="34.5" y2="30.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="37.5" y1="36" x2="35" y2="33.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="39" x2="35.5" y2="36.5" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Shoulder armor plates -->
  <path d="M17.5 20 Q16 21.5 16 23.5 Q17 23 18 21.5 Z" fill="#ddd" opacity="0.25"/>
  <path d="M32.5 20 Q34 21.5 34 23.5 Q33 23 32 21.5 Z" fill="#ddd" opacity="0.25"/>
  <!-- Red slash hints -->
  <line x1="21" y1="28" x2="22.5" y2="26.5" stroke="#f87171" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
  <line x1="27.5" y1="26.5" x2="29" y2="28" stroke="#f87171" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
</svg>
