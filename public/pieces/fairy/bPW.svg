<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="177.17" height="177.17">
  <defs>
    <linearGradient id="bPW-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#444"/>
      <stop offset="1" stop-color="#1f1a17"/>
    </linearGradient>
    <linearGradient id="bPW-bl" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#888"/>
      <stop offset="1" stop-color="#ccc"/>
    </linearGradient>
    <linearGradient id="bPW-g" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="25" cy="44" rx="14" ry="3.2" fill="#0a0a0a"/>
  <!-- Wider stem / flared skirt -->
  <path d="M18.5 24 C17 29 14 37 13 43 L37 43 C36 37 33 29 31.5 24 Z"
        fill="url(#bPW-b)" stroke="#111" stroke-width="0.7"/>
  <!-- Base platform -->
  <ellipse cx="25" cy="43" rx="12.5" ry="2.5" fill="url(#bPW-b)" stroke="#111" stroke-width="0.7"/>
  <!-- Wider collar / cup -->
  <path d="M21.5 16 Q17 18.5 16.5 21 Q16 23.5 18 24.5 L32 24.5 Q34 23.5 33.5 21 Q33 18.5 28.5 16 Z"
