      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#d4d4d4"/>
    </linearGradient>
    <linearGradient id="wDr-claw" gradientUnits="userSpaceOnUse" x1="18" y1="20" x2="32" y2="34">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.7"/>
