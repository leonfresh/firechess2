  <line x1="22.0" y1="20.0" x2="32.3" y2="33.8" stroke="url(#wDr-claw)" stroke-width="0.85" stroke-linecap="round" opacity="0.5"/>
  <line x1="31.8" y1="20.0" x2="21.5" y2="33.8" stroke="url(#wDr-claw2)" stroke-width="1.1" stroke-linecap="round" opacity="0.8"/>
