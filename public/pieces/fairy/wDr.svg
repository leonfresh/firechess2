  <path d="M7.5,45.5 L9,43 L6.5,43.5 Z" fill="#fde68a" opacity="0.7"/>
  <!-- SE spark -->
  <path d="M40.5,42 L43,45 L44.5,42.5 L42,41 Z" fill="url(#wDr-spark)" opacity="0.92"/>
  <path d="M42.5,45.5 L41,43 L43.5,43.5 Z" fill="#fde68a" opacity="0.7"/>

  <!-- Small amber ember between the battlements (decorative, suggesting fire) -->
