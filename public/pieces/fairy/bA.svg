  <rect x="24.2" y="4" width="1.6" height="5" rx="0.4" fill="#ddd"/>
  <rect x="22.8" y="5.5" width="4.4" height="1.5" rx="0.4" fill="#ddd"/>
  <!-- Knight head silhouette on the left side -->
  <g transform="translate(-2, 5) scale(0.55)">
    <path d="M18 32 Q16 30 14 27 Q12 24 11 22 Q10 20 10.5 18 Q11 16 13 14 Q14.5 12.5 16 12 Q17 11.5 18 12.5 Q18.5 13.5 17.5 14.5 Q15 16 14 18 Q13 20 14 22 Q15 24 17 26 L19 28 Q20 30 19 32 Z"
          fill="#ddd" opacity="0.9"/>
    <path d="M16 12 Q15 10 16 9 Q17 8 18 9 Q18.5 10 17.5 11.5 Z" fill="#ddd" opacity="0.9"/>
    <circle cx="15.5" cy="15" r="0.8" fill="#1f1a17"/>
  </g>
  <!-- Knight head silhouette on the right side (mirrored) -->
  <g transform="translate(52, 5) scale(-0.55, 0.55)">
    <path d="M18 32 Q16 30 14 27 Q12 24 11 22 Q10 20 10.5 18 Q11 16 13 14 Q14.5 12.5 16 12 Q17 11.5 18 12.5 Q18.5 13.5 17.5 14.5 Q15 16 14 18 Q13 20 14 22 Q15 24 17 26 L19 28 Q20 30 19 32 Z"
