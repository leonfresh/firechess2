    <path d="M16 12 Q15 10 16 9 Q17 8 18 9 Q18.5 10 17.5 11.5 Z" fill="#ddd" opacity="0.9"/>
    <circle cx="15.5" cy="15" r="0.8" fill="#1f1a17"/>
  </g>
  <!-- Collar detail -->
  <path d="M19 37 Q25 35 31 37" fill="none" stroke="#888" stroke-width="0.6"/>
  <path d="M20 36 Q25 34.5 30 36" fill="none" stroke="#888" stroke-width="0.4"/>
