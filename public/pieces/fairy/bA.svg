<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="177.17" height="177.17">
  <defs>
    <linearGradient id="bA-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#444"/>
      <stop offset="1" stop-color="#1f1a17"/>
    </linearGradient>
    <linearGradient id="bA-shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#888" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#555" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Base platform -->
  <ellipse cx="25" cy="46" rx="14" ry="3" fill="#1f1a17"/>
  <ellipse cx="25" cy="46" rx="12.5" ry="2.2" fill="url(#bA-body)" stroke="#111" stroke-width="0.8"/>
  <!-- Pedestal -->
  <path d="M14 44 Q14 42 16 40 L18 38 Q18.5 37.5 19 37 L31 37 Q31.5 37.5 32 38 L34 40 Q36 42 36 44 Z"
