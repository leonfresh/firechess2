<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="177.17" height="177.17">
  <defs>
    <linearGradient id="bAm-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#444"/>
      <stop offset="1" stop-color="#1f1a17"/>
    </linearGradient>
    <linearGradient id="bAm-crown" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#555"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- Base / pedestal -->
  <ellipse cx="25" cy="46.5" rx="14.5" ry="3.2" fill="#1f1a17"/>
  <ellipse cx="25" cy="46.5" rx="13" ry="2.5" fill="url(#bAm-body)" stroke="#111" stroke-width="0.7"/>
  <!-- Lower body -->
  <path d="M13 45 Q12.5 42 14 39 L16 37 Q17 36 18 35.5 L32 35.5 Q33 36 34 37 L36 39 Q37.5 42 37 45 Z"
        fill="url(#bAm-body)" stroke="#111" stroke-width="0.7"/>
  <!-- Mid body - tapered waist -->
  <path d="M18 35.5 Q17 32 18 28 L19 24 Q20 20 21 17 L25 12 L29 17 Q30 20 31 24 L32 28 Q33 32 32 35.5 Z"
        fill="url(#bAm-body)" stroke="#111" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Crown points (queen identifier) -->
  <path d="M17 14 L19 8 L21 13 L23 6 L25 12 L27 6 L29 13 L31 8 L33 14 L32 16 Q25 14 18 16 Z"
        fill="url(#bAm-crown)" stroke="#111" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Crown jewels (circles on points) -->
  <circle cx="19" cy="8" r="1.2" fill="#ddd"/>
  <circle cx="23" cy="6" r="1.2" fill="#ddd"/>
  <circle cx="27" cy="6" r="1.2" fill="#ddd"/>
  <circle cx="31" cy="8" r="1.2" fill="#ddd"/>
  <!-- Crown band -->
  <path d="M18 15.5 Q25 13.8 32 15.5 Q32 17 31 17 Q25 15.5 19 17 Q18 17 18 15.5 Z"
        fill="#888" opacity="0.8"/>
  <!-- Knight wing elements on sides (knight identifier) -->
  <g opacity="0.85">
    <!-- Left knight flourish -->
    <path d="M16 26 Q13 24 12 21 Q11 18 12.5 16 Q14 14 16 15 Q17 16 16 18 Q15 20 16 22 Z"
          fill="#ccc"/>
    <!-- Right knight flourish (mirrored) -->
    <path d="M34 26 Q37 24 38 21 Q39 18 37.5 16 Q36 14 34 15 Q33 16 34 18 Q35 20 34 22 Z"
          fill="#ccc"/>
  </g>
  <!-- Collar details -->
  <path d="M19 35 Q25 33.5 31 35" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Highlight -->
  <path d="M23.5 17 Q24.5 14 25 17 L24.5 32 Q24 34 24 35 L23 35 Q23 34 23.5 32 Z"
        fill="#888" opacity="0.15"/>
</svg>
