  <path d="M46.5 26.5 L47.5 27.5 L46.5 28.5" stroke="#fbbf24" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.75"/>
  <circle cx="47.8" cy="27.5" r="0.55" fill="#fef3c7" opacity="0.9"/>
